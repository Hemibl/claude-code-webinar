<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HaNemer Reminder Card</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 540px;
    height: 480px;
    background: #1a1008;
    font-family: -apple-system, sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Background photo effect */
  .bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 80% 60%, rgba(180,120,40,0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 20% 80%, rgba(80,50,10,0.25) 0%, transparent 50%),
      linear-gradient(160deg, #0d0a06 0%, #1c1208 40%, #120e07 100%);
  }

  /* Desk surface hint */
  .desk {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 220px;
    background: linear-gradient(to top, #2a1f0e 0%, #1e1609 60%, transparent 100%);
    border-top: 1px solid rgba(120,80,20,0.15);
  }

  /* Lamp glow */
  .lamp-glow {
    position: absolute;
    top: -60px;
    right: -40px;
    width: 260px;
    height: 260px;
    background: radial-gradient(circle, rgba(255,200,80,0.12) 0%, transparent 65%);
    border-radius: 50%;
    pointer-events: none;
  }

  /* Main card container */
  .card {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    padding: 28px 28px 0px;
  }

  /* Logo */
  .logo-wrap {
    background: #f5c800;
    border-radius: 14px;
    padding: 14px 28px 10px;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 28px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }

  .logo-wrap img {
    width: 130px;
    height: auto;
    display: block;
    margin-bottom: 4px;
  }

  .logo-text {
    color: #1a5c0a;
    font-size: 17px;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-align: center;
    line-height: 1.3;
    direction: rtl;
  }

  .logo-sub {
    color: #1a5c0a;
    font-size: 12.5px;
    font-weight: 600;
    text-align: center;
  }

  /* Laptop frame */
  .laptop-outer {
    width: 100%;
    background: linear-gradient(145deg, #3a3a3a 0%, #2a2a2a 40%, #222 100%);
    border-radius: 14px 14px 6px 6px;
    padding: 10px 10px 6px;
    box-shadow:
      0 20px 60px rgba(0,0,0,0.8),
      0 0 0 1px rgba(255,255,255,0.06),
      inset 0 1px 0 rgba(255,255,255,0.1);
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* Screen bezel */
  .screen-bezel {
    background: #111;
    border-radius: 8px 8px 0 0;
    padding: 3px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* Camera dot */
  .camera {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #333;
    margin: 0 auto 4px;
  }

  /* Terminal screen */
  .terminal {
    background: #0d0d0d;
    border-radius: 5px;
    padding: 16px;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-bottom: 40px;
    direction: rtl;
  }

  .term-content {
    width: 100%;
    padding: 0 8px;
  }

  .term-line {
    font-family: 'Courier New', Courier, monospace;
    color: #00e853;
    font-size: 20px;
    line-height: 1.9;
    text-shadow: 0 0 8px rgba(0,232,83,0.5);
    direction: rtl;
    text-align: right;
    white-space: nowrap;
  }

  .term-line .prompt {
    color: #00e853;
    margin-left: 8px;
  }

  .term-line.title {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 2px;
    color: #00ff5e;
    text-shadow: 0 0 12px rgba(0,255,94,0.6);
  }

  .term-line.cursor-line {
    margin-top: 16px;
    color: #00c844;
    font-size: 18px;
    direction: ltr;
    text-align: left;
  }

  .cursor {
    display: inline-block;
    width: 9px;
    height: 16px;
    background: #00e853;
    margin-right: 3px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Laptop base */
  .laptop-base {
    background: linear-gradient(to bottom, #2a2a2a, #222);
    height: 14px;
    border-radius: 0 0 8px 8px;
    border-top: 1px solid rgba(255,255,255,0.04);
  }

  .laptop-hinge {
    width: 80px;
    height: 4px;
    background: #1a1a1a;
    border-radius: 0 0 4px 4px;
    margin: 0 auto;
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="desk"></div>
<div class="lamp-glow"></div>

<div class="card">

  <!-- Laptop -->
  <div class="laptop-outer">
    <div class="screen-bezel">
      <div class="camera"></div>
      <div class="terminal">
        <div class="term-content">
          <div class="term-line title">
            <span class="prompt">&gt;</span> Claude Code - לנמרים מעופפים 🐆
          </div>
          <div class="term-line">
            <span class="prompt">&gt;</span> וובינר לייב &nbsp;|&nbsp; רביעי 15.4 &nbsp;|&nbsp; 21:00
          </div>
          <div class="term-line">
            <span class="prompt">&gt;</span> חמי בן לביא
          </div>
          <div class="term-line cursor-line">
            You: <span class="cursor"></span>_
          </div>
        </div>
      </div>
    </div>
    <div class="laptop-base">
      <div class="laptop-hinge"></div>
    </div>
  </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #0A0A0A;
    font-family: 'Segoe UI', Arial, sans-serif;
    direction: rtl;
    overflow: hidden;
    display: flex;
    align-items: stretch;
    color: #e5e5e5;
    position: relative;
  }

  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 85% 20%, rgba(34, 197, 94, 0.18), transparent 45%),
      radial-gradient(circle at 10% 90%, rgba(34, 197, 94, 0.10), transparent 40%);
    pointer-events: none;
  }

  .left-bar {
    width: 10px;
    background: linear-gradient(180deg, #22C55E, #16A34A);
    flex-shrink: 0;
  }

  .content {
    flex: 1;
    padding: 60px 70px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    z-index: 1;
  }

  .top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .badge {
    display: inline-block;
    background: rgba(34, 197, 94, 0.12);
    border: 1px solid rgba(34, 197, 94, 0.4);
    color: #22C55E;
    font-size: 16px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 100px;
    letter-spacing: 2px;
  }

  .terminal-chip {
    background: #141414;
    border: 1px solid #2a2a2a;
    color: #888;
    font-family: 'Courier New', monospace;
    font-size: 15px;
    padding: 10px 18px;
    border-radius: 8px;
  }

  .terminal-chip .prompt { color: #22C55E; margin-left: 8px; }

  .middle {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 22px;
    padding: 20px 0;
  }

  h1 {
    font-size: 84px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1.05;
    letter-spacing: -1px;
  }

  h1 span {
    color: #22C55E;
    text-shadow: 0 0 30px rgba(34, 197, 94, 0.4);
  }

  p.subtitle {
    font-size: 26px;
    color: #aaa;
    line-height: 1.5;
    max-width: 800px;
  }

  .steps {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-top: 6px;
  }

  .step-chip {
    background: #141414;
    border: 1px solid #1e1e1e;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 17px;
    color: #e5e5e5;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .step-chip .num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: rgba(34, 197, 94, 0.15);
    color: #22C55E;
    font-weight: 800;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid #1e1e1e;
    padding-top: 22px;
  }

  .author {
    font-size: 18px;
    color: #888;
  }

  .author strong {
    color: #fff;
    font-weight: 700;
  }

  .domain {
    font-size: 15px;
    color: #555;
    font-family: 'Courier New', monospace;
  }
</style>
</head>
<body>
  <div class="left-bar"></div>
  <div class="content">

    <div class="top">
      <div class="badge">CLAUDE CODE</div>
      <div class="terminal-chip"><span class="prompt">$</span>claude --version</div>
    </div>

    <div class="middle">
      <h1>מדריך <span>התקנה</span></h1>
      <p class="subtitle">עקבו אחרי השלבים - ותגיעו למפגש מוכנים לחלוטין.</p>
      <div class="steps">
        <div class="step-chip"><span class="num">1</span>Node.js</div>
        <div class="step-chip"><span class="num">2</span>Terminal</div>
        <div class="step-chip"><span class="num">3</span>Claude Code</div>
        <div class="step-chip"><span class="num">4</span>התחברות</div>
        <div class="step-chip"><span class="num">5</span>בדיקה</div>
      </div>
    </div>

    <div class="bottom">
      <div class="author"><strong>חמי בן-לביא</strong> · מדריך התקנה ל-Claude Code</div>
      <div class="domain">hemibl.github.io</div>
    </div>

  </div>
</body>
</html>
